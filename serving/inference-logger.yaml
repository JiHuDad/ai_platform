# KServe payload logger 가 호출할 sink. 단순 fluentd-like 컨테이너로 NDJSON 을 MinIO 에 적재.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference-logger
  namespace: serving
spec:
  replicas: 2
  selector: { matchLabels: { app: inference-logger } }
  template:
    metadata: { labels: { app: inference-logger } }
    spec:
      serviceAccountName: kserve-s3
      containers:
        - name: logger
          image: harbor.mlplatform.local/mlplatform/inference-logger:latest
          ports: [{ containerPort: 8080 }]
          env:
            - name: SINK_BUCKET
              value: inference-logs
            - name: MINIO_ENDPOINT
              value: http://minio.minio.svc.cluster.local:9000
            - name: AWS_ACCESS_KEY_ID
              valueFrom: { secretKeyRef: { name: minio-s3-creds, key: AWS_ACCESS_KEY_ID } }
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom: { secretKeyRef: { name: minio-s3-creds, key: AWS_SECRET_ACCESS_KEY } }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1,    memory: 512Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: inference-logger
  namespace: serving
spec:
  selector: { app: inference-logger }
  ports: [{ name: http, port: 80, targetPort: 8080 }]
