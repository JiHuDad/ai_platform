# KServe — Raw Deployment Mode 활성화.
# 적용:  helm upgrade --install kserve oci://ghcr.io/kserve/charts/kserve \
#          -n kserve -f 14-kserve-values.yaml
# (kserve-crd 는 별도 차트로 먼저 설치)
kserve:
  controller:
    deploymentMode: RawDeployment             # ← Knative 없이 표준 Deployment 사용
    gateway:
      ingressGateway:
        className: istio
        gateway: istio-system/kserve-gateway  # 별도 Gateway CR 사용
      knativeGateway: ""                      # Raw 모드라 미사용
    resources:
      requests: { cpu: 100m, memory: 256Mi }
      limits:   { cpu: "1",  memory: 1Gi }

# Storage initializer 가 MinIO 에서 모델 다운로드.
storage:
  s3:
    endpointURL: http://minio.minio.svc.cluster.local:9000
    region: us-east-1
    useVirtualBucket: "false"
    useAnonymousCredential: "false"
