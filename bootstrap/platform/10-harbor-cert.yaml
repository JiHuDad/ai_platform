# Harbor 외부 노출용 TLS 인증서 (사내 CA 서명).
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: harbor-tls
  namespace: harbor
spec:
  secretName: harbor-tls
  duration: 8760h
  renewBefore: 720h
  commonName: harbor.mlplatform.local
  dnsNames:
    - harbor.mlplatform.local
  issuerRef:
    name: mlplatform-ca
    kind: ClusterIssuer
