# KServe storage-initializer 가 MinIO 에서 모델을 받을 때 사용할 ServiceAccount.
apiVersion: v1
kind: Secret
metadata:
  name: minio-s3-creds
  namespace: serving
  annotations:
    serving.kserve.io/s3-endpoint: minio.minio.svc.cluster.local:9000
    serving.kserve.io/s3-usehttps: "0"
    serving.kserve.io/s3-region: us-east-1
    serving.kserve.io/s3-useanoncredential: "false"
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: kserve-sa
  AWS_SECRET_ACCESS_KEY: ChangeMe!Kserve2026
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kserve-s3
  namespace: serving
secrets:
  - name: minio-s3-creds
