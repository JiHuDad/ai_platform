apiVersion: batch/v1
kind: CronJob
metadata:
  name: evidently-mlp
  namespace: monitoring
spec:
  schedule: "*/15 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: evidently
              image: kfp-registry:5000/mlplatform/evidently-job:latest
              env:
                - { name: MODEL_NAME,    value: "mlp" }
                - { name: MODEL_VERSION, value: "current" }      # 'current' alias 로 reference 자동 갱신 가능
                - { name: WINDOW_MINUTES,value: "60" }
                - { name: MINIO_ENDPOINT,value: "http://192.168.1.37:9000" }
                - { name: PUSHGATEWAY_URL,value: "pushgateway.monitoring.svc:9091" }
                - name: AWS_ACCESS_KEY_ID
                  valueFrom: { secretKeyRef: { name: monitoring-minio-creds, key: AWS_ACCESS_KEY_ID } }
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom: { secretKeyRef: { name: monitoring-minio-creds, key: AWS_SECRET_ACCESS_KEY } }
              resources:
                requests: { cpu: 100m, memory: 256Mi }
                limits:   { cpu: "1",  memory: 1Gi }
---
# monitoring-minio-creds is created out-of-band with a least-privilege MinIO user.
# Do not store the MinIO admin credential in this manifest.
