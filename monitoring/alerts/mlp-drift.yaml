apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: mlp-drift
  namespace: monitoring
  labels:
    release: monitoring                # kube-prometheus-stack 가 picks up
spec:
  groups:
    - name: mlp.drift
      interval: 30s
      rules:
        - alert: MLPDriftHigh
          expr: max by (model) (mlp_drift_score{model="mlp"}) > 0.3
          for: 30m
          labels:
            severity: critical
            category: model_drift
          annotations:
            summary: "MLP drift_score > 0.3 for 30m on {{ $labels.model }}"
            description: |
              Evidently 가 측정한 share_of_drifted_columns 가 30분 이상 임계치를 넘었습니다.
              fine-tune 파이프라인이 자동 트리거됩니다.
        - alert: MLPFeatureDriftMany
          expr: max by (model) (mlp_feature_drift_count{model="mlp"}) >= 5
          for: 30m
          labels:
            severity: warning
            category: model_drift
          annotations:
            summary: "{{ $value }} features drifted for model {{ $labels.model }}"

    - name: mlp.serving
      interval: 30s
      rules:
        - alert: MLPHighErrorRate
          expr: |
            (
              sum(rate(istio_requests_total{destination_service_namespace="serving",response_code=~"5.."}[2m]))
              /
              sum(rate(istio_requests_total{destination_service_namespace="serving"}[2m]))
            ) > 0.01
          for: 3m
          labels:
            severity: critical
            category: serving_slo
          annotations:
            summary: "Serving 5xx ratio > 1% for 3m"
        - alert: MLPHighLatency
          expr: |
            histogram_quantile(0.95,
              sum by (le, destination_workload)
                (rate(istio_request_duration_milliseconds_bucket{destination_service_namespace="serving"}[2m]))
            ) > 500
          for: 5m
          labels:
            severity: critical
            category: serving_slo
          annotations:
            summary: "Serving p95 latency > 500ms on {{ $labels.destination_workload }}"
